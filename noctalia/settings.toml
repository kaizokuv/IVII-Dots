[audio]
enable_overdrive = true

[bar]
order = [ "Beans" ]

    [bar.Beans]
    background_opacity = 0.5
    center = [ "clock", "spacer_4", "launcher", "workspaces", "spacer_3", "date" ]
    end = [ "tray", "media", "network", "bluetooth", "volume", "brightness", "battery" ]
    margin_edge = 5
    margin_ends = 10
    start = [ "group:g1", "active_window", "privacy" ]

        [[bar.Beans.capsule_group]]
        fill = "surface_variant"
        id = "g1"
        members = [ "cpu", "ram", "network_rx", "network_tx", "temp" ]
        opacity = 0.0
        padding = 6.0

[[control_center.shortcuts]]
type = "audio"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "mic_mute"

[[control_center.shortcuts]]
type = "power_profile"

[[control_center.shortcuts]]
type = "wifi"

[desktop_widgets]
enabled = false
schema_version = 2
widget_order = [ "desktop-widget-0000000000000001" ]

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 1376.0
    box_width = 2096.0
    cx = 960.0
    cy = 1080.0
    output = "eDP-1"
    rotation = 0.0
    type = "audio_visualizer"

        [desktop_widgets.widget.desktop-widget-0000000000000001.settings]
        aspect_ratio = 1.8
        background_opacity = 0.0
        bands = 128.0
        show_when_idle = true

[idle]
pre_action_fade_seconds = 0

[location]
