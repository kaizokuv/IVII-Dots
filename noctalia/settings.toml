[nightlight]
enabled = true
force = true
temperature_day = 4000

[osd]
background_opacity = 0.4999999888241291

[plugins]
enabled = [
    "noctalia/mpvpaper",
    "noctalia/kaomoji",
    "noctalia/translator",
    "noctalia/notes",
    "noctalia/screen_recorder",
    "kaizoku/keybind-cheatsheet"
]

    [[plugins.source]]
    auto_update = true
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

    [[plugins.source]]
    auto_update = true
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

[shell]
avatar_path = "/home/kaizoku/Pictures/5.png"
password_style = "random"
polkit_agent = true
settings_show_advanced = true

    [shell.panel]
    clipboard_placement = "attached"
    transparency_mode = "glass"

    [shell.screenshot]
    directory = "/home/kaizoku/Pictures/Screenshots"

    [[shell.session.actions]]
    action = "lock"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    countdown_seconds = 0.0
    enabled = false
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "4"
    variant = "destructive"

    [[shell.session.actions]]
    action = "command"
    command = "notify-send 'Noctalia' 'Custom session entry'"
    countdown_seconds = 0.0
    enabled = true
    variant = "default"

